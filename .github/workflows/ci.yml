name: AIR-DROW Production Validation

on:
  push:
  pull_request:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Validate and build deployable app
        run: npm run build
