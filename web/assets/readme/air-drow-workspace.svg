<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">AIR-DROW workspace highlights</title><desc id="desc">AIR-DROW capability cards.</desc>
<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#111432"/><stop offset="1" stop-color="#31166d"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000" flood-opacity=".35"/></filter></defs>
<rect width="1600" height="900" fill="#090b1e"/><circle cx="1380" cy="115" r="220" fill="#7a57ff" fill-opacity=".26"/><circle cx="160" cy="770" r="250" fill="#00d8ff" fill-opacity=".12"/>
<text x="100" y="120" fill="#fff" font-family="Arial, sans-serif" font-size="58" font-weight="700">One studio. Your way of creating.</text>
<text x="102" y="168" fill="#c9c6e4" font-family="Arial, sans-serif" font-size="26">Everything stays focused on drawing, saving and sharing your ideas.</text>
<g filter="url(#s)"><g transform="translate(100 245)"><rect width="410" height="470" rx="34" fill="url(#g)" stroke="#fff" stroke-opacity=".17"/><circle cx="72" cy="80" r="40" fill="#8d71ff"/><path d="M53 99 97 55" stroke="#fff" stroke-width="12" stroke-linecap="round"/><text x="42" y="170" fill="#fff" font-family="Arial, sans-serif" font-size="36" font-weight="700">Draw naturally</text><text x="42" y="215" fill="#dad6f1" font-family="Arial, sans-serif" font-size="22">Use touch or a pen for an</text><text x="42" y="248" fill="#dad6f1" font-family="Arial, sans-serif" font-size="22">immediate blank canvas.</text><rect x="42" y="315" width="320" height="92" rx="22" fill="#ffffff" fill-opacity=".10"/><text x="70" y="370" fill="#fff" font-family="Arial, sans-serif" font-size="23">Brush · Eraser · Shapes</text></g>
<g transform="translate(595 245)"><rect width="410" height="470" rx="34" fill="url(#g)" stroke="#fff" stroke-opacity=".17"/><circle cx="72" cy="80" r="40" fill="#26d7ff"/><path d="M60 88c24-35 50 2 75-20" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round"/><text x="42" y="170" fill="#fff" font-family="Arial, sans-serif" font-size="36" font-weight="700">Draw in the air</text><text x="42" y="215" fill="#dad6f1" font-family="Arial, sans-serif" font-size="22">Open Camera when you choose</text><text x="42" y="248" fill="#dad6f1" font-family="Arial, sans-serif" font-size="22">and draw with your hand.</text><rect x="42" y="315" width="320" height="92" rx="22" fill="#ffffff" fill-opacity=".10"/><text x="70" y="370" fill="#fff" font-family="Arial, sans-serif" font-size="23">Camera · Hand · Eraser</text></g>
<g transform="translate(1090 245)"><rect width="410" height="470" rx="34" fill="url(#g)" stroke="#fff" stroke-opacity=".17"/><circle cx="72" cy="80" r="40" fill="#ff72cf"/><path d="M54 78h36l18 18-18 18H54z" fill="none" stroke="#fff" stroke-width="9" stroke-linejoin="round"/><text x="42" y="170" fill="#fff" font-family="Arial, sans-serif" font-size="36" font-weight="700">Keep your work</text><text x="42" y="215" fill="#dad6f1" font-family="Arial, sans-serif" font-size="22">Save projects, make backups</text><text x="42" y="248" fill="#dad6f1" font-family="Arial, sans-serif" font-size="22">and export when you are ready.</text><rect x="42" y="315" width="320" height="92" rx="22" fill="#ffffff" fill-opacity=".10"/><text x="70" y="370" fill="#fff" font-family="Arial, sans-serif" font-size="23">Save · Backup · Export</text></g></g>
</svg>